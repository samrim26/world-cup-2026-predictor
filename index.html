<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026 — Live Tracker</title>
<style>
  :root{--bg:#0b1020;--card:#141b2e;--card2:#0f1626;--line:#2a3552;--dim:#8a96b3;
        --txt:#e8edf7;--grn:#2ecc71;--red:#e74c3c;--yel:#f1c40f;--cyan:#34c6e0;--accent:#3d6bff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:14px 20px 0;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:1px solid var(--line)}
  .titlerow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  header h1{margin:0;font-size:19px}
  .sub{color:var(--dim);font-size:12px}
  nav{display:flex;gap:4px;margin-top:10px;overflow-x:auto}
  nav button{background:none;border:none;color:var(--dim);font:inherit;font-weight:600;
             padding:8px 13px;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap}
  nav button.active{color:var(--txt);background:var(--card);border-bottom:2px solid var(--accent)}
  main{padding:16px 20px 60px;max-width:1500px;margin:0 auto}
  h2{font-size:14px;margin:22px 0 10px;color:var(--cyan);letter-spacing:.3px}
  h2:first-child{margin-top:4px}
  .grid{display:grid;gap:12px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .groups{grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:4px 7px;font-variant-numeric:tabular-nums}
  th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase}
  tr+tr td{border-top:1px solid #1d2740}
  .in{color:var(--grn)} .out{color:var(--red)} .dim{color:var(--dim)}
  .metric{font-size:23px;font-weight:700} .pill{font-size:11px;color:var(--dim)}
  .live{color:var(--red);font-weight:700} .win{color:var(--grn);font-weight:700}
  .tlink{color:inherit;cursor:pointer;border-bottom:1px dotted var(--dim)}
  .tlink:hover{color:var(--cyan);border-color:var(--cyan)}
  .gbadge{display:inline-block;min-width:18px;text-align:center;background:#1d2740;border-radius:4px;
          padding:1px 5px;font-size:11px;color:var(--dim)}
  /* matches list */
  .mlist{max-height:75vh;overflow:auto;border:1px solid var(--line);border-radius:10px}
  .daterow{position:sticky;top:0;background:var(--card2);padding:6px 12px;color:var(--cyan);
           font-weight:600;font-size:12px;border-bottom:1px solid var(--line);z-index:1}
  .mrow{display:grid;grid-template-columns:74px 30px 1fr auto;gap:10px;align-items:center;
        padding:8px 12px;border-bottom:1px solid #182135}
  .mrow:hover{background:var(--card2)}
  .mscore{font-weight:700;font-variant-numeric:tabular-nums}
  .predbox{text-align:right;color:var(--dim);font-size:12px;min-width:120px}
  .pts{display:inline-block;margin-left:6px;border-radius:5px;padding:0 5px;font-weight:700;font-size:11px}
  /* clinch highlights */
  .clinch-1{color:var(--yel);font-weight:600} .clinch-q{color:var(--grn);font-weight:600}
  tr.row-1 td{background:rgba(241,196,15,.10)} tr.row-1 td:nth-child(3){box-shadow:inset 3px 0 var(--yel)}
  tr.row-q td{background:rgba(46,204,113,.09)} tr.row-q td:nth-child(3){box-shadow:inset 3px 0 var(--grn)}
  tr.row-out td{opacity:.5}
  /* rankings bar */
  .bar{height:8px;background:#1d2740;border-radius:4px;overflow:hidden;min-width:60px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan))}
  /* filter chips */
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin:4px 0 12px}
  .chips button{background:var(--card);border:1px solid var(--line);color:var(--dim);font:inherit;
    font-weight:600;padding:4px 11px;border-radius:14px;cursor:pointer}
  .chips button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .wc{font-size:11px;background:rgba(241,196,15,.10);border:1px solid rgba(241,196,15,.35);
    border-radius:6px;padding:1px 6px;white-space:nowrap;color:var(--dim)}
  /* simultaneous-games joint-outcome grid */
  .simwrap{overflow-x:auto;margin-top:8px}
  .simgrid{border-collapse:collapse;font-size:11px;min-width:460px}
  .simgrid th,.simgrid td{border:1px solid var(--line);padding:4px 7px;vertical-align:top;text-align:left}
  .simgrid th{background:var(--card2);color:var(--dim);font-weight:600;white-space:nowrap}
  .simgrid td>div{white-space:nowrap;line-height:1.55}
  .simnote{font-size:11px;color:var(--cyan);margin-top:4px}
  /* pool race pick badges */
  .pikyou{background:rgba(241,196,15,.18);color:var(--yel);border-radius:4px;padding:0 5px;font-size:10px;font-weight:700}
  .pikriv{background:rgba(52,198,224,.15);color:var(--cyan);border-radius:4px;padding:0 5px;font-size:10px;font-weight:700}
  .pikboth{background:#2a2f45;color:var(--dim);border-radius:4px;padding:0 5px;font-size:10px;font-weight:700}
  .scorebar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .scorebar .metric{font-size:30px}
  .lever{padding:6px 0;border-top:1px solid #182135}
  .lever:first-of-type{border-top:none}
  @keyframes flashpop{0%{box-shadow:0 0 0 2px var(--accent);background:rgba(61,107,255,.18)}100%{box-shadow:none;background:transparent}}
  .flash{animation:flashpop 1.4s ease-out;border-radius:8px}
  /* bracket */
  .bk{display:flex;align-items:stretch;gap:6px;overflow-x:auto;padding:6px 0}
  .side{display:flex;flex:1}
  .col{display:flex;flex-direction:column;justify-content:space-around;flex:1 0 96px;min-width:96px}
  .pair{display:flex;flex-direction:column;justify-content:space-around;flex:1;position:relative}
  .bk .m{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:3px 6px;
         margin:4px 0;font-size:11px;line-height:1.5;position:relative;z-index:1}
  .bk .m>div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .side.left .col:not(:last-child) .pair{border-right:2px solid var(--line)}
  .side.left .col:not(:last-child) .pair::after{content:'';position:absolute;top:50%;right:-7px;width:7px;height:2px;background:var(--line)}
  .side.left .col:not(:first-child) .pair::before{content:'';position:absolute;top:50%;left:-7px;width:7px;height:2px;background:var(--line)}
  .side.right .col:not(:first-child) .pair{border-left:2px solid var(--line)}
  .side.right .col:not(:first-child) .pair::after{content:'';position:absolute;top:50%;left:-7px;width:7px;height:2px;background:var(--line)}
  .side.right .col:not(:last-child) .pair::before{content:'';position:absolute;top:50%;right:-7px;width:7px;height:2px;background:var(--line)}
  .center{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;min-width:150px;padding:0 6px}
  .final{background:var(--card);border:2px solid var(--accent);border-radius:10px;padding:12px;text-align:center;min-width:140px}
  .final .lbl{color:var(--dim);font-size:11px;text-transform:uppercase}
  .final .m{font-size:14px;line-height:1.7}
  .roundlbl{color:var(--dim);font-size:10px;text-transform:uppercase;text-align:center;margin-bottom:2px}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(4,8,18,.72);display:none;align-items:flex-start;
           justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:560px;width:100%;padding:18px 20px}
  .modal h3{margin:0 0 2px} .modal .x{float:right;cursor:pointer;color:var(--dim);font-size:20px}
  .err{color:var(--red);padding:20px}
  @media(max-width:680px){.mrow{grid-template-columns:64px 26px 1fr;}.predbox{grid-column:3;text-align:left;padding-top:2px}
    .center{min-width:120px}.bk{font-size:10px}}
</style>
</head>
<body>
<header>
  <div class="titlerow"><h1>⚽ World Cup 2026 — Live</h1><span class="sub" id="meta">loading…</span>
    <span class="sub" style="margin-left:auto" id="champ"></span></div>
  <nav id="nav"></nav>
</header>
<main id="app"><p class="dim">Fetching live data…</p></main>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>

<script>
const TABS=[['live','🔴 Live'],['bracket','🏆 Bracket'],['race','💰 Race'],['picks','🎯 My Picks'],['groups','📊 Groups']];
let DATA=null, TAB='live';
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const tl=ab=>ab?`<span class="tlink" data-team="${esc(ab)}">${esc(ab)}</span>`:'';
const ptsColor=p=>p>=5?'#1b5e20':p>=3?'#14532d':p>0?'#3a3a1a':'#3a1a1a';

function nav(){document.getElementById('nav').innerHTML=
  TABS.map(([k,l])=>`<button class="${k===TAB?'active':''}" onclick="setTab('${k}')">${l}</button>`).join('')}
function setTab(t){TAB=t;nav();body()}

function meta(){
  document.getElementById('meta').textContent=`updated ${DATA.updated}`;
  const p=DATA.pool, lead=p.lead;
  document.getElementById('champ').innerHTML=`<b>Race:</b> You ${p.you.total} – ${p.rival.total} Rival <b class="${lead>=0?'in':'out'}">(${lead>=0?'+':''}${lead})</b>`;
}

/* ---------- TABS ---------- */
function body(){
  if(!DATA){return}
  const f={live:liveTab,bracket:bracketTab,race:raceTab,picks:picksTab,groups:groupsTab}[TAB];
  document.getElementById('app').innerHTML=f();
}

/* group-stage views, archived behind a sub-nav */
let groupSub='standings';
function setGroupSub(s){groupSub=s;body();}
const GROUP_SUBS=[['standings','Standings'],['matches','Matches'],['rankings','Rankings'],['scenarios','Scenarios']];
function groupsTab(){
  let h=`<p class="dim" style="font-size:12px;margin:2px 0 8px">Group stage complete — archived for reference.</p>
    <div class="chips">`+GROUP_SUBS.map(([k,l])=>`<button class="${groupSub===k?'on':''}" onclick="setGroupSub('${k}')">${l}</button>`).join('')+`</div>`;
  return h+({standings:standingsTab,matches:matchesTab,rankings:rankingsTab,scenarios:scenariosTab}[groupSub]());
}

// pick badge for a team: gold = your pick, blue = rival's, grey = both
function pikBadge(t){const p=DATA.pool;const y=p.you_all.includes(t),r=p.rival_all.includes(t);
  return y&&r?'<span class="pikboth">both</span>':y?'<span class="pikyou">you</span>':r?'<span class="pikriv">rival</span>':'';}
function liveTab(){
  const p=DATA.pool, lead=p.lead;
  const youLev={},rivLev={};p.you_levers.forEach(l=>youLev[l.team]=l.upside);p.rival_levers.forEach(l=>rivLev[l.team]=l.upside);
  const stake=m=>{const parts=[];[m.home,m.away].forEach(t=>{
      if(youLev[t])parts.push(`<span class="in">your ${esc(t)} +${youLev[t]} in play</span>`);
      else if(rivLev[t])parts.push(`<span class="out">rival ${esc(t)} +${rivLev[t]} in play</span>`);});
    return parts.length?`<div class="dim" style="font-size:11px;margin-top:4px">${parts.join(' · ')}</div>`:'';};
  let h=`<div class="card" style="border-color:var(--accent)"><div class="scorebar">
      <span><b>💰 The Race</b> <span class="dim">vs ${esc(p.rival.name)}</span></span>
      <span style="font-size:15px">You <b>${p.you.total}</b> – <b>${p.rival.total}</b> Rival
        <b class="${lead>=0?'in':'out'}">(${lead>=0?'+':''}${lead})</b>
        <button onclick="setTab('race')" style="margin-left:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 9px;font:inherit;font-weight:600;cursor:pointer">details →</button></span>
    </div></div>`;
  h+=`<h2>Today</h2><div class="grid cards">`;
  if(!DATA.today.length)h+=`<p class="dim">No matches today.</p>`;
  DATA.today.forEach(m=>{
    const tag=m.state==='in'?`<span class="live">🔴 ${esc(m.clock||'LIVE')}</span>`:m.state==='post'?`<span class="dim">FT</span>`:`<span class="dim">${esc(m.detail||'scheduled')}</span>`;
    h+=`<div class="card"><div class="dim">${tl(m.home)} ${pikBadge(m.home)} v ${tl(m.away)} ${pikBadge(m.away)}</div>
      <div class="metric">${esc(m.home_score)}–${esc(m.away_score)}</div>
      <div style="display:flex;justify-content:space-between">${tag}</div>${stake(m)}</div>`;});
  h+=`</div>`;
  if(DATA.goals.length){h+=`<h2>⚽ Goals (latest first)</h2><div class="card">`;
    DATA.goals.forEach(g=>h+=`<div style="padding:3px 0"><span class="dim" style="display:inline-block;width:60px;text-align:right">${esc(g.clock)}</span>
      <b>${tl(g.team)}</b> ${esc(g.scorer)} <span class="dim">${g.type!=='Goal'?'('+esc(g.type)+') ':''}[${esc(g.match)}]</span></div>`);
    h+=`</div>`;}
  return h;
}

/* ---------- RACE (head-to-head pool) ---------- */
function leverCol(title,levers,accent){
  let h=`<div class="card"><div class="pill">${esc(title)}</div>`;
  if(!levers.length)h+=`<p class="dim" style="font-size:12px;margin:6px 0 0">No live edges left.</p>`;
  levers.forEach(l=>{
    const rounds=l.rounds.map(r=>{const c=r.state==='hit'?'in':r.state==='out'?'out':'dim';
      const mk=r.state==='hit'?' ✓':r.state==='out'?' ✗':'';
      return `<span class="${c}" style="font-size:11px">${esc(r.label)} +${r.pts}${mk}</span>`;}).join(' · ');
    h+=`<div class="lever"><b>${tl(l.team)}</b> <span class="${accent}" style="font-weight:700">+${l.upside}</span>
       <span class="dim" style="font-size:11px">still in play</span>
       <div class="dim" style="font-size:11px;margin-top:2px">${rounds}</div></div>`;});
  return h+`</div>`;
}
function raceTab(){
  const p=DATA.pool, lead=p.lead;
  const leadCls=lead>0?'in':lead<0?'out':'dim';
  const youUp=p.you_levers.reduce((s,l)=>s+l.upside,0), rivUp=p.rival_levers.reduce((s,l)=>s+l.upside,0);
  let h=`<div class="card" style="border-color:var(--accent)"><div class="scorebar">
      <div><div class="dim" style="font-size:12px">YOU</div><div class="metric">${p.you.total}</div></div>
      <div style="text-align:center"><div class="${leadCls}" style="font-size:14px;font-weight:700">${lead>0?'You lead':lead<0?'You trail':'Level'}${lead?' by '+Math.abs(lead):''}</div>
        <div class="dim" style="font-size:11px;margin-top:2px">💰 $${p.prize.pool} pool · $${p.prize.buy_in} buy-in</div></div>
      <div style="text-align:right"><div class="dim" style="font-size:12px">${esc(p.rival.name).toUpperCase()}</div><div class="metric">${p.rival.total}</div></div>
    </div></div>`;
  h+=`<p class="dim" style="font-size:12px;margin:10px 2px">🤝 ${esc(p.shared.note)} So the title race between you two is decided purely where your brackets diverge:</p>`;
  h+=`<div class="grid" style="grid-template-columns:1fr 1fr;gap:12px">
      ${leverCol('🟡 Your edge',p.you_levers,'in')}
      ${leverCol("🔵 Rival's edge",p.rival_levers,'out')}</div>`;
  h+=`<h2>📈 Where the lead can go</h2><div class="card" style="font-size:13px">
      <div>If <b>all your edges hit</b> and theirs miss: <b class="in">+${lead+youUp}</b></div>
      <div>If <b>all their edges hit</b> and yours miss: <b class="out">${lead-rivUp}</b></div>
      <div class="dim" style="font-size:11px;margin-top:4px">Your ${youUp} pts vs their ${rivUp} pts still in play. Biggest swing: <b>${p.you_levers[0]?tl(p.you_levers[0].team)+' (+'+p.you_levers[0].upside+')':'—'}</b>.</div></div>`;
  // per-round points
  const RR=[['R32','R32'],['R16','R16'],['QF','Quarterfinal'],['SF','Semifinal'],['THIRD','Third place'],['FINAL','Final'],['WINNER','Winner']];
  h+=`<h2>Points by round</h2><div class="card"><table><tr><th>Round</th><th>You</th><th>Rival</th></tr>`;
  const cell=o=>`${o.earned}${o.potential>o.earned?` <span class="dim">(+${o.potential-o.earned})</span>`:''}`;
  RR.forEach(([k,lbl])=>{h+=`<tr><td>${esc(lbl)}</td><td>${cell(p.you.rounds[k])}</td><td>${cell(p.rival.rounds[k])}</td></tr>`;});
  h+=`</table><div class="dim" style="font-size:11px;margin-top:4px">earned (+ still live)</div></div>`;
  if(p.third_undetermined)h+=`<p class="dim" style="font-size:11px;margin-top:8px">⚠️ Rival's 3rd-place pick is undetermined (England or France) — modeled as a possible +40 either way.</p>`;
  return h;
}

function matchesTab(){
  let h=`<h2>All 72 group matches <span class="dim">· your prediction on the right · click a team for its schedule</span></h2><div class="mlist">`;
  let lastDate='';
  DATA.schedule.forEach(m=>{
    if(m.et_date!==lastDate){lastDate=m.et_date;h+=`<div class="daterow">${fmtDate(m.et_date)}</div>`;}
    h+=matchRow(m);});
  return h+`</div>`;
}
function matchRow(m){
  const live=m.state==='in', done=m.state==='post';
  const sc=done||live?`${esc(m.home_score)}–${esc(m.away_score)}`:`<span class="dim">v</span>`;
  const tag=live?`<span class="live">🔴 ${esc(m.clock||'')}</span>`:done?`<span class="dim">FT</span>`:`<span class="dim">${esc(m.et_time||'')}</span>`;
  let pred='';
  if(m.predicted){pred=`pred ${esc(m.predicted)}`;
    if(done&&m.points!=null)pred+=`<span class="pts" style="background:${ptsColor(m.points)};color:#fff">+${m.points}</span>`;}
  return `<div class="mrow"><div class="dim" style="font-size:12px">${esc(m.et_time||'')}<br>${tag}</div>
    <div class="gbadge">${esc(m.group)}</div>
    <div>${tl(m.home)} <span class="mscore">${sc}</span> ${tl(m.away)}</div>
    <div class="predbox">${pred}</div></div>`;
}

let scenFilter='All';
function setScenFilter(g){scenFilter=g;body();}
function scenariosTab(){
  /* ---- per-game group-table scenarios, filterable by group / wildcard movers ---- */
  let h='';
  // index the wildcard line-movers by game (+ outcome) so each card is self-contained
  const swing={}, movers=new Set();
  (DATA.wildcard_swings||[]).forEach(s=>{const key=`${s.group}|${s.home}|${s.away}`;movers.add(key);
    s.outcomes.forEach(o=>{swing[`${key}|${o.outcome}`]={entered:o.entered,dropped:o.dropped};});});
  h+=`<h2>What's at stake <span class="dim">· the group table after each result &nbsp; (<span class="in">🟢 knockout spot</span> · <b class="in">bold = 1st</b> · <span class="out">🔴 eliminated</span> · <span class="wc">🟡 moves the wildcard line</span>)</span></h2>`;
  const grps=[...new Set(DATA.scenarios.map(s=>s.group))].sort();
  h+=`<div class="chips"><button class="${scenFilter==='All'?'on':''}" onclick="setScenFilter('All')">All</button>`+
     `<button class="${scenFilter==='WC'?'on':''}" onclick="setScenFilter('WC')">🟡 Wildcard movers</button>`+
     grps.map(g=>`<button class="${scenFilter===g?'on':''}" onclick="setScenFilter('${g}')">${g}</button>`).join('')+`</div>`;
  const isMover=s=>s.games.some(g=>movers.has(`${s.group}|${g.home}|${g.away}`));
  const slots=DATA.scenarios.filter(s=>scenFilter==='All'?true:
    scenFilter==='WC'?isMover(s):s.group===scenFilter);
  if(!slots.length)return h+`<p class="dim">No games match this filter.</p>`;
  // one team's line in a ranking, coloured by clinch status
  const line=(r,pts)=>{const cls=r.status==='elim'?'out':(r.status==='advance'||r.status==='first')?'in':'';
    const b=r.status==='first'?'font-weight:700':'';
    return `<span class="${cls}" style="${b}">${r.pos}. ${tl(r.abbr)}${pts?` <small class="dim" style="color:inherit;opacity:.7">${r.pts}p</small>`:''}</span>`;};
  const gLive=g=>g.state==='in'
    ? ` <span class="live">🔴 ${esc(g.home_score)}–${esc(g.away_score)}${g.clock?' '+esc(g.clock):''}</span>`:'';
  const gl=(g,oc)=>oc==='H'?`${esc(g.home)} win`:oc==='A'?`${esc(g.away)} win`:'draw';
  slots.forEach(s=>{
    const mark=isMover(s)?' <span title="affects the 3rd-place wildcard cutoff">🟡</span>':'';
    const title=s.games.map(g=>`${tl(g.home)} v ${tl(g.away)}${gLive(g)}`).join(' &nbsp;+&nbsp; ');
    h+=`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span><b>${title}</b>${mark}</span>
        <span class="dim" style="font-size:12px"><span class="gbadge">${esc(s.group)}</span> ${fmtDate(s.et_date)} · ${esc(s.et_time||'')}</span></div>`;
    if(s.simultaneous && s.games.length===2){
      // both kick off together -> the table depends on BOTH results (3x3 grid)
      const [g0,g1]=s.games, cmap={};
      s.combos.forEach(c=>cmap[c.results[0].outcome+c.results[1].outcome]=c);
      const cell=c=>c?c.ranking.map(r=>{const cls=r.status==='elim'?'out':(r.status==='advance'||r.status==='first')?'in':'dim';
        const b=r.status==='first'?'font-weight:700':'';return `<div class="${cls}" style="${b}">${r.pos} ${esc(r.abbr)}</div>`;}).join(''):'';
      h+=`<div class="simnote">⏱ These kick off simultaneously — the final table depends on BOTH results.</div>
        <div class="simwrap"><table class="simgrid">
        <tr><th style="font-size:10px">${tl(g0.home)} v ${tl(g0.away)} ⌄<br>&nbsp;&nbsp;&nbsp;${tl(g1.home)} v ${tl(g1.away)} ›</th>
          ${['H','D','A'].map(j=>`<th>${gl(g1,j)}</th>`).join('')}</tr>`;
      ['H','D','A'].forEach(i=>{h+=`<tr><th>${gl(g0,i)}</th>`+
        ['H','D','A'].map(j=>`<td>${cell(cmap[i+j])}</td>`).join('')+`</tr>`;});
      h+=`</table></div></div>`;
    } else {
      // single game (or rare >2): one row per (joint) outcome
      const single=s.games.length===1;
      const key=single?`${s.group}|${s.games[0].home}|${s.games[0].away}`:null;
      h+=`<table style="margin-top:6px">`;
      s.combos.forEach(c=>{
        const order=c.ranking.map(r=>line(r,true)).join(' &nbsp; ');
        let wc='';
        if(single){const sw=swing[`${key}|${c.results[0].outcome}`];
          if(sw){const parts=sw.dropped.map(a=>`<span class="out">${esc(a)} OUT</span>`)
            .concat(sw.entered.map(a=>`<span class="in">${esc(a)} IN</span>`)).join(', ');
            wc=` <span class="wc">🟡 ${parts}</span>`;}}
        h+=`<tr><td style="width:96px;color:var(--dim);vertical-align:top">${esc(c.label)}</td><td>${order}${wc}</td></tr>`;});
      h+=`</table>`;
    }
    h+=`</div>`;});
  return h;
}

function standingsTab(){
  let h=`<h2>Group standings <span class="dim">(green = top 2, yellow = wildcard spot)</span></h2><div class="grid groups">`;
  Object.entries(DATA.groups).forEach(([g,rows])=>{
    h+=`<div class="card"><div class="pill">Group ${esc(g)}</div><table>`;
    rows.forEach(t=>{const adv=t.live_status.startsWith('advancing');const wc=t.live_status==='wildcard IN';
      h+=`<tr><td><span class="${adv?'in':''}" style="${wc?'color:var(--yel)':''}">${tl(t.abbr)}</span>
        <span class="dim">${t.P} ${t.W}-${t.D}-${t.L} ${t.GD>=0?'+':''}${t.GD} · ${t.Pts}p</span></td></tr>`;});
    h+=`</table></div>`;});
  return h+`</div>`;
}

function rankingsTab(){
  let h=`<h2>Full 48-team ranking <span class="dim">· ordered as a league table (Pts → GD → GF)</span></h2>
    <div style="margin-bottom:8px;font-size:12px">
      <span class="clinch-1">🥇 clinched 1st in group</span> &nbsp;

/* ---------- BRACKET ---------- */
const L_R32=[74,77,73,75,83,84,81,82],R_R32=[76,78,79,80,86,88,85,87];
const L_R16=[89,90,93,94],R_R16=[91,92,95,96],L_QF=[97,98],R_QF=[99,100],L_SF=[101],R_SF=[102];
function bracketTab(){
  const byNum={};Object.values(DATA.live_bracket).flat().forEach(m=>byNum[m.match]=m);
  const col=nums=>{let h='';for(let i=0;i<nums.length;i+=2){
      h+=`<div class="pair">${nums.slice(i,i+2).map(n=>bkM(byNum[n])).join('')}</div>`;}return `<div class="col">${h}</div>`;};
  const fin=byNum[104];
  const pr=DATA.pool, banked=pr.you.bracket_earned;
  const earnedStr=['R32','R16','QF','SF','THIRD'].filter(k=>pr.you.rounds[k].earned).map(k=>`${k} ${pr.you.rounds[k].earned}`).join(' · ')||'—';
  return `<div class="card" style="margin-bottom:10px;font-size:13px"><b>Your bracket points so far:</b> ${banked}
      <span class="dim">(${earnedStr})</span> &nbsp;·&nbsp;
      <span class="dim" style="font-size:11px"><span style="color:var(--yel)">•</span> your pick &nbsp; <span style="color:var(--cyan)">•</span> rival's pick</span></div>
   <h2>Live bracket <span class="dim">· official 2026 template · ? = provisional · 3rd[..] = wildcard slot</span></h2>
   <div class="bk">
    <div class="side left">${col(L_R32)}${col(L_R16)}${col(L_QF)}${col(L_SF)}</div>
    <div class="center">
      <div class="roundlbl">Final</div>
      <div class="final"><div class="lbl">Final</div><div class="m">${bkSide(fin,'a')}<br><span class="dim">v</span><br>${bkSide(fin,'b')}</div></div>
      <div class="dim" style="font-size:11px">3rd place: ${bs3()}</div>
    </div>
    <div class="side right">${col(R_SF)}${col(R_QF)}${col(R_R16)}${col(R_R32)}</div>
   </div>
   <p class="dim" style="font-size:11px;margin-top:10px">Winners advance automatically as results come in. Scroll horizontally on small screens.</p>
   ${picksBracket()}`;
}
/* the user's own predicted bracket (static) */
function pBkM(m){if(!m)return '<div class="m dim">—</div>';
  const side=t=>t===m.winner?`<b class="win">${esc(t)}</b>`:tl(t);
  return `<div class="m"><div>${side(m.a)}</div><div>${side(m.b)}</div></div>`;}
function pCol(ms){let h='';for(let i=0;i<ms.length;i+=2){
    h+=`<div class="pair">${ms.slice(i,i+2).map(pBkM).join('')}</div>`;}return `<div class="col">${h}</div>`;}
function picksBracket(){
  const pb=DATA.picks_bracket;if(!pb)return '';
  const R=pb.rounds,half=a=>[a.slice(0,a.length/2),a.slice(a.length/2)];
  const[l32,r32]=half(R['Round of 32']),[l16,r16]=half(R['Round of 16']);
  const[lqf,rqf]=half(R['Quarterfinals']),[lsf,rsf]=half(R['Semifinals']);
  const fin=R['Final'][0],fs=t=>t===fin.winner?`<b class="win">${esc(t)}</b>`:tl(t);
  return `<h2 style="margin-top:28px">🗺️ My predicted bracket <span class="dim">· champion <b class="win">${esc(pb.champion)}</b> · runner-up ${esc(pb.runner_up)} · 3rd ${esc(pb.third)}</span></h2>
   <div class="bk">
    <div class="side left">${pCol(l32)}${pCol(l16)}${pCol(lqf)}${pCol(lsf)}</div>
    <div class="center">
      <div class="roundlbl">Final</div>
      <div class="final"><div class="lbl">Final</div><div class="m">${fs(fin.a)}<br><span class="dim">v</span><br>${fs(fin.b)}</div></div>
    </div>
    <div class="side right">${pCol(rsf)}${pCol(rqf)}${pCol(r16)}${pCol(r32)}</div>
   </div>
   <p class="dim" style="font-size:11px;margin-top:10px">Your locked-in picks (green = your predicted winner). Scroll horizontally on small screens.</p>`;
}
// tiny pick marker: gold = your pick, cyan = rival's
function pikDot(t){if(!DATA.pool)return '';const y=DATA.pool.you_all.includes(t),r=DATA.pool.rival_all.includes(t);
  return y&&r?'<span title="both picks" style="color:var(--dim)">•</span>':y?'<span title="your pick" style="color:var(--yel)">•</span>':r?'<span title="rival pick" style="color:var(--cyan)">•</span>':'';}
function bkSide(m,which){if(!m)return '';const team=m[which+'_team'],lbl=m[which];
  const dot=team&&isReal(team)?pikDot(team):'';
  if(m.winner&&team===m.winner)return `<b class="win">${esc(lbl)}</b>${dot}`;
  return team&&isReal(team)?tl(team)+(lbl.endsWith('?')?'?':'')+dot:(m.ready?esc(lbl):`<span class="dim">${esc(lbl)}</span>`);}
function bkM(m){if(!m)return '<div class="m dim">—</div>';
  return `<div class="m" title="Match ${m.match}"><div>${bkSide(m,'a')}</div><div>${bkSide(m,'b')}</div></div>`;}
function bs3(){return '—';}

function picksTab(){
  const s=DATA.score,cs=DATA.bracket_survival;
  let h=`<p style="margin:4px 0 14px"><a href="https://cup.survivetheleague.com/en/league/a31b3b30-a660-4d5a-8918-4087534946d6" target="_blank" rel="noopener"
      style="display:inline-block;background:var(--accent);color:#fff;padding:8px 14px;border-radius:8px;font-weight:600;text-decoration:none">↗ Open my league on Survive the League</a></p>
   <h2>🎯 Predicted vs actual <span class="dim">(your pool score)</span></h2>
   <div class="card"><span class="metric">${s.total}</span> <span class="pill">/ ${s.max_possible} pts · ${s.exact} exact · ${s.correct_outcome} correct results · ${s.n} matches</span>
   <table style="margin-top:8px"><tr><th>Match</th><th>Pred</th><th>Actual</th><th>Pts</th></tr>`;
  s.rows.slice(0,30).forEach(r=>{const cl=r.points>=3?'in':(r.points===0?'dim':'');
    h+=`<tr class="${cl}"><td>${esc(r.match)}</td><td>${esc(r.predicted)}</td><td>${esc(r.actual)}</td><td>+${r.points}</td></tr>`;});
  h+=`</table></div><h2>🗺️ Your bracket — survival</h2><div class="grid cards">`;
  cs.tiers.forEach(t=>{const cl=t.alive===t.total?'in':(t.alive?'':'out');
    h+=`<div class="card"><div class="pill">${esc(t.label)}</div><div class="metric ${cl}">${t.alive}/${t.total}</div></div>`;});
  return h+`</div>`;
}

/* ---------- TEAM MODAL ---------- */
function openTeam(ab){
  const rk=DATA.rankings.find(r=>r.abbr===ab);if(!rk)return;
  const games=DATA.schedule.filter(m=>m.home===ab||m.away===ab);
  let h=`<span class="x" onclick="closeModal()">×</span><h3>${esc(rk.name)} <span class="dim">(${esc(ab)} · Group ${esc(rk.group)})</span></h3>
    <div class="dim" style="margin-bottom:10px">${rk.P} played · ${rk.W}-${rk.D}-${rk.L} · ${rk.Pts} pts · GD ${rk.GD>=0?'+':''}${rk.GD}</div>
    <table>`;
  games.forEach(m=>{const opp=m.home===ab?m.away:m.home,homeAway=m.home===ab?'vs':'@';
    const done=m.state==='post',live=m.state==='in';
    const res=done||live?`${esc(m.home_score)}–${esc(m.away_score)}`:`<span class="dim">${esc(m.et_time||'')}</span>`;
    const st=live?`<span class="live">LIVE</span>`:done?'FT':'';
    let p=m.predicted?`<span class="dim">pred ${esc(m.predicted)}${done&&m.points!=null?` (+${m.points})`:''}</span>`:'';
    h+=`<tr><td class="dim">${fmtDate(m.et_date)}</td><td>${homeAway} ${tl(opp)}</td><td class="mscore">${res}</td><td>${st}</td><td>${p}</td></tr>`;});
  // bracket slot
  const slot=Object.values(DATA.live_bracket).flat().find(m=>m.a_team===ab||m.b_team===ab);
  if(slot)h+=`</table><div class="dim" style="margin-top:10px">Bracket: ${esc(slot.round)} — ${esc(slot.a)} v ${esc(slot.b)}</div>`;
  else h+=`</table>`;
  document.getElementById('modal').innerHTML=h;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
document.addEventListener('click',e=>{const t=e.target.closest('[data-team]');if(t)openTeam(t.dataset.team)});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ---------- helpers + load ---------- */
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d){if(!d)return '';const[y,m,da]=d.split('-');return `${MON[+m-1]} ${+da}`;}
function isReal(ab){return DATA.rankings.some(r=>r.abbr===ab)}

let lastTotals={you:null,rival:null}, pollTimer=null;
function scheduleNext(){
  // poll fast while a match is live, slower when idle
  const live=DATA&&DATA.today&&DATA.today.some(m=>m.state==='in');
  clearTimeout(pollTimer);
  pollTimer=setTimeout(load, live?5000:30000);
}
function flashScores(){
  document.querySelectorAll('.scorebar,#champ').forEach(e=>{
    e.classList.remove('flash');void e.offsetWidth;e.classList.add('flash');});
}
async function load(){
  try{
    const r=await fetch('/api/live',{cache:'no-store'});DATA=await r.json();
    if(DATA.error){document.getElementById('app').innerHTML=`<p class="err">Feed error: ${esc(DATA.error)}</p>`;scheduleNext();return;}
    const changed=DATA.pool&&lastTotals.you!==null&&
      (DATA.pool.you.total!==lastTotals.you||DATA.pool.rival.total!==lastTotals.rival);
    if(DATA.pool)lastTotals={you:DATA.pool.you.total,rival:DATA.pool.rival.total};
    nav();meta();body();
    if(changed)flashScores();
  }catch(e){document.getElementById('app').innerHTML=`<p class="err">Could not load: ${esc(e.message)}</p>`;}
  scheduleNext();
}
// refresh immediately when the tab/window regains focus, too
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load();});
window.addEventListener('focus',load);
load();
</script>
