<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026 — Live Tracker</title>
<style>
  :root{--bg:#0b1020;--card:#141b2e;--line:#26304a;--dim:#8a96b3;--txt:#e8edf7;
        --grn:#2ecc71;--red:#e74c3c;--yel:#f1c40f;--cyan:#34c6e0;--accent:#3d6bff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:18px 22px;border-bottom:1px solid var(--line);
         display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
         position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{margin:0;font-size:20px;letter-spacing:.3px}
  .sub{color:var(--dim);font-size:12px}
  main{padding:18px 22px;max-width:1500px;margin:0 auto}
  h2{font-size:15px;margin:26px 0 10px;color:var(--cyan);letter-spacing:.4px}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .groups{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  .bracket{grid-template-columns:repeat(5,minmax(120px,1fr));overflow-x:auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:3px 6px;font-variant-numeric:tabular-nums}
  th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
  tr+tr td{border-top:1px solid #1d2740}
  .in{color:var(--grn)} .out{color:var(--red)} .dim{color:var(--dim)}
  .metric{font-size:24px;font-weight:700} .pill{font-size:11px;color:var(--dim)}
  .match{font-size:12px;padding:5px 0;border-bottom:1px solid #1d2740}
  .win{color:var(--grn);font-weight:700}
  .tiers{display:flex;gap:10px;flex-wrap:wrap}
  .tier{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:120px}
  .live{color:var(--red);font-weight:700}
  .err{color:var(--red);padding:20px}
  .goal{display:flex;gap:10px;font-size:13px;padding:3px 0}
  .goal .min{color:var(--dim);width:64px;text-align:right}
  .cut{border-top:2px dashed var(--red);margin:4px 0}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>⚽ World Cup 2026 — Live</h1>
  <span class="sub" id="meta">loading…</span>
  <span class="sub" style="margin-left:auto" id="champ"></span>
</header>
<main id="app"><p class="dim">Fetching live data…</p></main>

<script>
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild};
const esc = (s)=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function teamCell(t){return `${esc(t.abbr)} <span class="dim">${t.P} ${t.W}-${t.D}-${t.L} ${t.GD>=0?'+':''}${t.GD} · ${t.Pts}p</span>`}

function render(d){
  document.getElementById('meta').textContent =
    `updated ${d.updated} · groups ${d.groups_done}/12 done · ${d.source}`;
  const cs = d.bracket_survival;
  document.getElementById('champ').innerHTML =
    `champion pick: <b class="${cs.champion_alive?'in':'out'}">${esc(cs.champion)} ${cs.champion_alive?'ALIVE':'OUT'}</b>`;

  let h = '';

  // Today + goals
  h += `<h2>Today</h2><div class="grid cards">`;
  if(!d.today.length) h += `<p class="dim">No matches today.</p>`;
  d.today.forEach(m=>{
    const tag = m.state==='in'?`<span class="live">🔴 LIVE ${esc(m.clock||'')}</span>`
      : m.state==='post'?`<span class="dim">FT</span>`:`<span class="dim">${esc(m.detail||'scheduled')}</span>`;
    const pred = m.predicted?`<span class="pill" title="your prediction">pred ${esc(m.predicted)}</span>`:'';
    h += `<div class="card"><div class="dim">${esc(m.home)} v ${esc(m.away)}</div>
      <div class="metric">${esc(m.home_score)}–${esc(m.away_score)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">${tag}${pred}</div></div>`;
  });
  h += `</div>`;
  if(d.goals.length){
    h += `<h2>⚽ Goals (latest first)</h2><div class="card">`;
    d.goals.forEach(g=> h += `<div class="goal"><span class="min">${esc(g.clock)}</span>
      <b>${esc(g.team)}</b> <span>${esc(g.scorer)}</span>
      <span class="dim">${g.type!=='Goal'?'('+esc(g.type)+') ':''}[${esc(g.match)}]</span>
      ${g.live?'<span class="live">●</span>':''}</div>`);
    h += `</div>`;
  }

  // Two columns: wildcard + predicted-vs-actual
  h += `<div class="grid" style="grid-template-columns:1fr 1fr">`;
  h += `<div><h2>🟡 Third-place wildcard race</h2><div class="card"><table>
    <tr><th>#</th><th>Team</th><th>Grp</th><th>P</th><th>Pts</th><th>GD</th><th>GF</th><th></th></tr>`;
  d.thirds.forEach(t=>{
    if(t.wildcard_rank===9) h += `<tr><td colspan="8"><div class="cut"></div></td></tr>`;
    const cl = t.wildcard_status==='IN'?'in':'out';
    h += `<tr class="${cl}"><td>${t.wildcard_rank}</td><td>${esc(t.team)}</td><td>${esc(t.group)}</td>
      <td>${t.P}</td><td>${t.Pts}</td><td>${t.GD>=0?'+':''}${t.GD}</td><td>${t.GF}</td><td>${t.wildcard_status}</td></tr>`;
  });
  h += `</table></div></div>`;

  const sc = d.score;
  h += `<div><h2>🎯 Predicted vs actual</h2><div class="card">
    <span class="metric">${sc.total}</span> <span class="pill">/ ${sc.max_possible} pts ·
    ${sc.exact} exact · ${sc.correct_outcome} correct results · ${sc.n} matches</span>
    <table style="margin-top:8px"><tr><th>Match</th><th>Pred</th><th>Actual</th><th>Pts</th></tr>`;
  sc.rows.slice(0,10).forEach(r=>{
    const cl = r.points>=3?'in':(r.points===0?'dim':'');
    h += `<tr class="${cl}"><td>${esc(r.match)}</td><td>${esc(r.predicted)}</td><td>${esc(r.actual)}</td><td>+${r.points}</td></tr>`;
  });
  h += `</table></div></div></div>`;

  // Bracket survival
  h += `<h2>🗺️ Your bracket — survival</h2><div class="tiers">`;
  cs.tiers.forEach(t=>{
    const cl = t.alive===t.total?'in':(t.alive?'':'out');
    h += `<div class="tier"><div class="pill">${esc(t.label)}</div>
      <div class="metric ${cl}">${t.alive}/${t.total}</div></div>`;
  });
  h += `</div>`;

  // Live bracket
  h += `<h2>🏆 Live bracket <span class="dim" style="font-size:12px">(official template · ? = provisional · 3rd[..] = wildcard TBD · advances live)</span></h2>`;
  h += `<div class="grid bracket">`;
  ['Round of 32','Round of 16','Quarterfinal','Semifinal','Final'].forEach(rnd=>{
    h += `<div><div class="pill" style="margin-bottom:6px">${rnd}</div>`;
    (d.live_bracket[rnd]||[]).forEach(m=>{
      const fmt=(team,lbl)=> (m.winner&&team===m.winner)?`<span class="win">${esc(lbl)}</span>`
        :(m.ready?esc(lbl):`<span class="dim">${esc(lbl)}</span>`);
      h += `<div class="match">${fmt(m.a_team,m.a)} <span class="dim">v</span> ${fmt(m.b_team,m.b)}</div>`;
    });
    h += `</div>`;
  });
  h += `</div>`;

  // Group standings
  h += `<h2>Group standings <span class="dim" style="font-size:12px">(green = top 2, yellow = wildcard spot)</span></h2><div class="grid groups">`;
  Object.entries(d.groups).forEach(([g,rows])=>{
    h += `<div class="card"><div class="pill">Group ${esc(g)}</div><table>`;
    rows.forEach(t=>{
      const c = t.live_status.startsWith('advancing')?'in':(t.live_status==='wildcard IN'?'':'');
      const sty = t.live_status==='wildcard IN'?'color:var(--yel)':'';
      h += `<tr><td class="${c}" style="${sty}">${teamCell(t)}</td></tr>`;
    });
    h += `</table></div>`;
  });
  h += `</div>`;

  document.getElementById('app').innerHTML = h;
}

async function load(){
  try{
    const r = await fetch('/api/live',{cache:'no-store'});
    const d = await r.json();
    if(d.error){ document.getElementById('app').innerHTML = `<p class="err">Feed error: ${esc(d.error)}</p>`; return; }
    render(d);
  }catch(e){ document.getElementById('app').innerHTML = `<p class="err">Could not load: ${esc(e.message)}</p>`; }
}
load(); setInterval(load, 30000);
</script>
</body>
</html>
